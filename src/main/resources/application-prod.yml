spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aigateway}
    username: ${DB_USER:aigateway}
    password: ${DB_PASSWORD:aigateway}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration/common

logging:
  level:
    root: INFO
    com.aigateway: INFO
